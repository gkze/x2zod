name: Publish

on:
  push:
    branches:
      - main
    paths:
      - .changeset/**
      - apps/*/bin/**
      - apps/*/CHANGELOG.md
      - apps/*/jsr.json
      - apps/*/package.json
      - apps/*/src/**
      - packages/*/base.json
      - packages/*/bin/**
      - packages/*/CHANGELOG.md
      - packages/*/jsr.json
      - packages/*/package.json
      - packages/*/schema/**
      - packages/*/src/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run registry publish commands with --dry-run.
        default: true
        required: false
        type: boolean
      ref:
        description: Git ref to publish. Defaults to the current workflow ref.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  BUN_VERSION: 1.3.14
  NODE_VERSION: 26.3.0

jobs:
  release:
    name: Create Version PR Or Publish Packages
    runs-on: ubuntu-24.04
    environment: publish
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          echo "SHELLCHECK_BINARY=/usr/bin/shellcheck" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Create version PR or publish packages
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          commit: "chore: version packages"
          publish: bun run publish:packages
          title: "chore: version packages"
          version: bun run release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  manual-publish:
    name: Manual Publish
    runs-on: ubuntu-24.04
    environment: publish
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          echo "SHELLCHECK_BINARY=/usr/bin/shellcheck" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Dry-run package adapters
        if: ${{ inputs.dry_run }}
        run: bun run publish:packages -- --dry-run

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          publish: bun run publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
