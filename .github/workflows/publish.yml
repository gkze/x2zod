name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run registry publish commands with --dry-run.
        default: true
        required: false
        type: boolean
      ref:
        description: Git ref to publish. Defaults to the current workflow ref.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  BUN_VERSION: 1.3.14
  NODE_VERSION: 24

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Publish package adapters
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            bun run publish:packages -- --dry-run
          else
            bun run publish:packages
          fi

      - name: Push package tags
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: git push --follow-tags
