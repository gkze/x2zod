name: Publish

on:
  push:
    branches:
      - main
    paths:
      - .changeset/**
      - apps/*/bin/**
      - apps/*/CHANGELOG.md
      - apps/*/jsr.json
      - apps/*/package.json
      - apps/*/src/**
      - packages/*/base.json
      - packages/*/bin/**
      - packages/*/CHANGELOG.md
      - packages/*/jsr.json
      - packages/*/package.json
      - packages/*/schema/**
      - packages/*/src/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run registry publish commands with --dry-run.
        default: true
        required: false
        type: boolean
      ref:
        description: Git ref to publish. Defaults to the current workflow ref.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  ACTIONLINT_VERSION: 1.7.12
  BUN_VERSION: 1.3.14
  NODE_VERSION: 24.18.0
  SHELLCHECK_VERSION: 0.11.0

jobs:
  release:
    name: Create Version PR Or Publish Packages
    runs-on: ubuntu-24.04
    environment: publish
    if: ${{ github.event_name == 'push' }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Provision native lint tools
        run: |
          set -euo pipefail
          tools_dir="$RUNNER_TEMP/x2zod-tools"
          mkdir -p "$tools_dir"

          actionlint_archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$actionlint_archive"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $actionlint_archive" \
            | sha256sum --check
          tar -xzf "$actionlint_archive" -C "$tools_dir" actionlint

          shellcheck_archive="$RUNNER_TEMP/shellcheck.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.gz" \
            --output "$shellcheck_archive"
          echo "b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6  $shellcheck_archive" \
            | sha256sum --check
          tar -xzf "$shellcheck_archive" -C "$tools_dir" --strip-components=1 \
            "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"

          echo "ACTIONLINT_BIN=$tools_dir/actionlint" >> "$GITHUB_ENV"
          echo "SHELLCHECK_BINARY=$tools_dir/shellcheck" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun --no-env-file install --frozen-lockfile

      - name: Run checks
        run: bun --no-env-file run check --force

      - name: Create version PR or publish packages
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commitMode: github-api
          commit: "chore: version packages"
          publish: bun --no-env-file run publish:packages
          title: "chore: version packages"
          version: bun --no-env-file run release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  manual-publish:
    name: Manual Publish
    runs-on: ubuntu-24.04
    environment: publish
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Provision native lint tools
        run: |
          set -euo pipefail
          tools_dir="$RUNNER_TEMP/x2zod-tools"
          mkdir -p "$tools_dir"

          actionlint_archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$actionlint_archive"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $actionlint_archive" \
            | sha256sum --check
          tar -xzf "$actionlint_archive" -C "$tools_dir" actionlint

          shellcheck_archive="$RUNNER_TEMP/shellcheck.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.gz" \
            --output "$shellcheck_archive"
          echo "b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6  $shellcheck_archive" \
            | sha256sum --check
          tar -xzf "$shellcheck_archive" -C "$tools_dir" --strip-components=1 \
            "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"

          echo "ACTIONLINT_BIN=$tools_dir/actionlint" >> "$GITHUB_ENV"
          echo "SHELLCHECK_BINARY=$tools_dir/shellcheck" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun --no-env-file install --frozen-lockfile

      - name: Run checks
        run: bun --no-env-file run check --force

      - name: Dry-run package adapters
        if: ${{ inputs.dry_run }}
        run: bun --no-env-file run publish:packages -- --dry-run

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commitMode: github-api
          publish: bun --no-env-file run publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
