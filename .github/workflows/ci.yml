name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate prek config
        run: bunx prek validate-config prek.toml

      - name: Run checks
        run: bun run check

      - name: Lint commit messages
        run: |
          before="${{ github.event.before }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            if git cat-file -e "$base^{commit}" && git cat-file -e "$head^{commit}"; then
              bun run commitlint --from "$base" --to "$head"
            else
              bun run commitlint --last
            fi
          elif [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}"; then
            bun run commitlint --last
          else
            bun run commitlint --from "$before" --to "${{ github.sha }}"
          fi
