name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          echo "SHELLCHECK_BINARY=/usr/bin/shellcheck" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check changesets
        if:
          ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref,
          'changeset-release/') }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed_payload="$(git diff --name-only "$base"...HEAD -- \
            'apps/*/bin/**' \
            'apps/*/jsr.json' \
            'apps/*/package.json' \
            'apps/*/src/**' \
            'packages/*/base.json' \
            'packages/*/bin/**' \
            'packages/*/jsr.json' \
            'packages/*/package.json' \
            'packages/*/schema/**' \
            'packages/*/src/**')"

          if [ -z "$changed_payload" ]; then
            echo "No package payload changes."
            exit 0
          fi

          printf '%s\n' "$changed_payload"
          bun run changeset status --since="$base"

      - name: Run checks
        run: bun run check

      - name: Lint commit messages
        run: |
          before="${{ github.event.before }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            if git cat-file -e "$base^{commit}" && git cat-file -e "$head^{commit}"; then
              bun run commitlint --from "$base" --to "$head"
            else
              bun run commitlint --last
            fi
          elif [[ "$before" =~ ^0+$ ]] || ! git cat-file -e "$before^{commit}"; then
            bun run commitlint --last
          else
            bun run commitlint --from "$before" --to "${{ github.sha }}"
          fi
